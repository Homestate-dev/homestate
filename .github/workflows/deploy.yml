name: Build and Deploy to Heroku

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # ---------- Frontend ----------
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          mkdir -p ../backend/static/
          cp -r out/* ../backend/static/
          cd ..

      # ---------- Backend tests (opcional) ----------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend deps (optional)
        run: pip install -r server/requirements.txt

      # ---------- Heroku CLI ----------
      - name: Install Heroku CLI
        uses: ynab/heroku-cli-action@v1

      # ---------- Deploy ----------
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: homestate-ecuador
          heroku_email: homestate.dev@gmail.com
          usedocker: false         # ya tenemos la CLI; Docker no es necesario
